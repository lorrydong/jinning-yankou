<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晋宁焰口 · 标注工具</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Noto Serif CJK SC", "SimSun", "Songti SC", serif;
  background: #1a1a2e;
  color: #e8d5b7;
  max-width: 960px;
  margin: 0 auto;
  padding: 16px;
}
.header { text-align:center; padding:20px 0; border-bottom:1px solid #3a3a5e; margin-bottom:16px; }
.header h1 { font-size:22px; color:#f0d78a; }
.header .subtitle { font-size:13px; color:#8a8aaa; margin-top:4px; }

/* 工具栏 */
.toolbar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  padding: 10px 12px; background: #222244; border-radius: 8px; margin-bottom: 16px;
}
.toolbar .btn {
  padding: 8px 16px; border: none; border-radius: 6px;
  font-size: 13px; cursor: pointer; font-family: inherit;
}
.btn-primary { background: #f0d78a; color: #1a1a2e; }
.btn-primary:hover { background: #e0c770; }
.btn-warning { background: #c0392b; color: white; }
.btn-success { background: #27ae60; color: white; }
.btn-info { background: #3498db; color: white; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.status-bar {
  font-size: 12px; color: #8a8aaa; margin-left: auto;
}
.status-bar .highlight { color: #f0d78a; }

/* 音频控制条 */
.audio-section {
  background: #0f0f1e; border-radius: 8px; padding: 12px; margin-bottom: 16px;
}
.audio-section audio { width: 100%; }
.audio-time {
  text-align: center; font-family: monospace; font-size: 14px;
  color: #8a8aaa; margin-top: 6px;
}

/* 标注模式提示 */
.mode-banner {
  text-align: center; padding: 8px; border-radius: 6px; margin-bottom: 12px;
  font-size: 14px; font-weight: bold;
}
.mode-idle { background: #2a2a44; color: #6a6a8a; }
.mode-recording { background: #1e3a1e; color: #6aaa6a; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%{opacity:1} 50%{opacity:0.6} 100%{opacity:1} }

/* 进度条 */
.progress-bar {
  height: 4px; background: #3a3a5e; border-radius: 2px; margin-bottom: 16px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%; background: #f0d78a; border-radius: 2px; transition: width 0.3s;
}

/* 经文段落列表 */
.doc-section {
  margin-bottom: 6px; padding: 10px 14px;
  background: #222244; border-radius: 6px;
  border-left: 3px solid #4a4a7e;
  cursor: pointer; transition: all 0.2s;
  position: relative;
}
.doc-section:hover { background: #2a2a54; border-left-color: #f0d78a; }
.doc-section .sec-title {
  font-size: 12px; color: #8a8aaa; margin-bottom: 2px;
}
.doc-section .sec-text {
  font-size: 15px; line-height: 1.7;
}
.doc-section .sec-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  margin-left: 8px; display: inline-block;
}
.badge-done { background: #1e3a1e; color: #6aaa6a; }
.badge-current { background: #3a3a1e; color: #f0d78a; }
.badge-pending { background: #2a2a3e; color: #5a5a7a; }

.doc-section.annotated {
  border-left-color: #27ae60; opacity: 0.85;
}
.doc-section.annotated .sec-text { color: #8a8a8a; }
.doc-section.active {
  border-left-color: #f0d78a; background: #2a3a2a;
}
.doc-section .sec-time {
  font-size: 11px; color: #5a5a7a; margin-top: 4px;
  font-family: monospace;
}

/* 快捷键提示 */
.hotkeys {
  font-size: 12px; color: #5a5a7a; text-align: center;
  padding: 8px; border-top: 1px solid #3a3a5e; margin-top: 12px;
}
.hotkeys kbd {
  background: #2a2a44; padding: 1px 6px; border-radius: 3px;
  font-family: monospace; color: #8a8aaa; border: 1px solid #4a4a7e;
}

/* 模态框 */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 200; justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #1a1a2e; border: 1px solid #3a3a5e; border-radius: 12px;
  padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal h2 { color: #f0d78a; margin-bottom: 12px; }
.modal textarea {
  width: 100%; min-height: 200px; background: #0f0f1e;
  color: #e8d5b7; border: 1px solid #3a3a5e; border-radius: 6px;
  padding: 12px; font-family: monospace; font-size: 12px;
}
.modal .btn-row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }

/* 手机适配 */
@media (max-width: 480px) {
  body { padding: 8px; }
  .doc-section { padding: 8px 10px; }
  .doc-section .sec-text { font-size: 14px; }
  .toolbar .btn { font-size: 12px; padding: 6px 10px; }
}

/* 滚动快速定位 */
.scroll-nav {
  position: fixed; right: 8px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 2px; z-index: 50;
}
.scroll-nav .dot {
  width: 8px; height: 8px; border-radius: 50%; border: none;
  cursor: pointer; padding: 0; background: #3a3a5e; transition: background 0.2s;
}
.scroll-nav .dot.annotated { background: #27ae60; }
.scroll-nav .dot.current { background: #f0d78a; }
.scroll-nav .dot:hover { transform: scale(1.5); }
</style>
</head>
<body>

<div class="header">
  <h1>瑜伽焰口施食要集 · 标注工具</h1>
  <div class="subtitle">晋宁焰口 · 2024年4月30日录 ｜ 听一段唱诵 → 点击对应的经文段落</div>
</div>

<div id="modeBanner" class="mode-banner mode-idle">⏸ 待命 — 播放音频后点击【开始标注】</div>

<!-- 工具栏 -->
<div class="toolbar">
  <button class="btn btn-primary" id="btnStart" disabled onclick="startAnnotation()">▶ 开 始 标 注</button>
  <button class="btn btn-info" onclick="exportData()">💾 导出标注结果</button>
  <button class="btn btn-success" onclick="document.getElementById('importInput').click()">📂 导入存档</button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
  <button class="btn btn-warning" onclick="resetAll()">⟳ 重置</button>
  <span class="status-bar" id="statusBar">已标注: <span class="highlight" id="countDone">0</span> / <span id="countTotal">0</span></span>
</div>

<!-- 音频 -->
<div class="audio-section">
  <audio id="audioPlayer" controls>
    <source src="晋宁焰口上.mp3" type="audio/mpeg">
    <source src="晋宁焰口下.mp3" type="audio/mpeg">
  </audio>
  <div class="audio-time">当前：<span id="timeDisplay">00:00:00</span></div>
</div>

<!-- 进度 -->
<div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>

<!-- 经文列表 -->
<div id="sectionList"></div>

<!-- 底部快捷键 -->
<div class="hotkeys">
  <kbd>Space</kbd> 播放/暂停 ｜
  <kbd>Enter</kbd> 标注当前选中段 ｜
  <kbd>↑</kbd><kbd>↓</kbd> 切换段落 ｜
  <kbd>←</kbd><kbd>→</kbd> 快退/快进5秒
</div>

<!-- 导出模态框 -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2>📋 标注结果</h2>
    <p style="color:#8a8aaa; margin-bottom:12px;">复制下方JSON数据发送给我，我来生成最终的点读页面。</p>
    <textarea id="exportText" readonly></textarea>
    <div class="btn-row">
      <button class="btn btn-info" onclick="copyExport()">📋 复制</button>
      <button class="btn btn-warning" onclick="closeModal('exportModal')">关闭</button>
    </div>
  </div>
</div>

<script>
// ===== 经文数据 =====

let totalSections = 0;

let lastClickTime = 0;

// ===== 初始化 =====

const EMBEDDED_DATA = `[{"id": 0, "title": "焰口施食要集", "text": "瑜伽焰口施食要集"}, {"id": 1, "title": "瑜伽焰口序", "text": "昔世尊为一大事因缘，出现于世，普欲众生，超脱生死，入般涅盘。四十九年，或显或密，随机化导。其说权实顿渐也，如拨云见日，开门见山。其示印咒观道也，务收摄身心，裨益道力。要皆令现前后世，一切众生，力行静照，远离尘网，共悟无生，自他两利耳。。瑜伽，竺国语，此翻相应，密部之总名也。约而言之，手结密印，口诵真言，意专观想。身与口协，口与意符，意与身会，三业相应，故曰瑜伽。推而广之，即与密部中乘境、行、果，所有诸法，亦莫不相应也。焰口者，因阿难尊者发起，文中已载，不赘。有不空法师者，述为瑜伽集要救阿难陀罗尼焰口仪轨经。而阿阇黎复节之为瑜伽集要焰口施食仪轨。此卷现存藏中，海上谓其文相太约，遂乃增益科仪。天机（禅师）复节去繁芜，云栖（莲池大师）重加参订。实乃小异大同，繁文未尽削去。。夫利济幽冥者，惟戌亥二时，过此，则鬼神不得食，乃虚延时刻，而无实功。余初至山中，留心于此，意在不简不繁，而文意具足，吾宝华每每用焉。然必三业相应，道行高隆，精研熟练，方能自利利他，不然，罹咎弗少。今诸弟子，固请梓之，以传永久，因叙数语于首，以备本山行用。若曰流通于世，则吾岂敢。。时康熙癸酉年秋分第三褒洒陀日宝华一雨定庵基述。《瑜伽焰口注集纂要仪轨》云：“夫欲遍供普济者，虔恳至诚，严洁坛场。随力备办香花，供养饮食、净水等已。准戌亥二时(晚上7点至11点)施之，饿鬼得食，施主获福。如过其时，徒废精神，于事无益。斯出本教，亦非胸见。今有违者，地方不宁，即此过也。若欲深明所以，请观后注，文备彰矣。”（《瑜伽焰口注集纂要仪轨》，清寂暹编纂，收入卍新纂续藏经No.1084）"}, {"id": 2, "title": "【校录说明】", "text": "焰口施食仪轨有多种版本，寺院中常用的是《瑜伽焰口施食要集》，网上没有，大藏经中也没有收录。笔者在校录时只录入正文，而略去了相关注释。施食时的很多手印、咒语和观想说明，请参考《瑜伽焰口注集纂要仪轨》(二卷，清寂暹编纂，收入卍新纂续藏经No.1084)，较为详细。文中咒语颇多，要求三密相应，特别是佛顶尊胜陀罗尼（广咒，胜于短咒）和金刚萨埵百字明咒的读音，参考大藏经中的多种版本和藏密原版进行了校对，发现古代祖师的翻译最为精确，严丝合缝，赞叹不已。只因古今汉语变化太大，以致读音和人心一样不古。所以对一部分生僻字对照古音和梵音用汉语拼音标注，使其尽量接近原貌。例如“癹”，咒语常用字，现在一般读pan。但梵文中发音为“ba”。犹豫数日，偶尔用中文全拼输入法找同音字，突然翻出了“癹”，发音正是ba，心遂释然，益发敬佩古人。如果不是用电脑打字，我还真不知道癹读ba、佛读bo、也、夜读ya（古音）、誐读e、垤恎（侄）读die、蔢（婆）读bo、葛、噶、伽读ga、纥读he或ge、哑读a，……而这些读音都与古汉语、梵音相近。由此可见古代祖师所翻译的经咒都非常精确严谨，一丝不苟，不惜用二三个汉字注解一个梵音，如“二合”、“三合”等，甚至对发音的长短高低也有标注（如引、上、入、去等）。可惜，古道今不存，而今一国独尊的现代汉语和普通话是“解放后”被严重歪曲篡改的官方话，与古汉语大相径庭。如果有唐朝人讲话的录音，我们今人一句也听不懂，却可以自以为是地将伽读qie、他读tuo、那读nu、怛恎他读danzhituo，这些都是很明显的错误，却习焉不察。此外，按古律，咒语中带口字旁的汉字，如啰、噜、哩、哆、隆等，皆是弹舌音，即舌尖快速弹动，藏语、蒙语、印度语、新疆语等常见。所以我认为，念经诵咒不必用普通话，在对佛法虔诚恭敬、至心信乐的前提下，可以用当地方言，最好是闽南语、客家语，它们属于唐朝官话，最接近古汉语，我一直心向往之。（了悟子谨识）"}, {"id": 3, "title": "大宝华王座　人天普护持　我今登演处　触目即菩提", "text": "--------------------------------------------------------------------------------"}, {"id": 4, "title": "瑜伽焰口施食要集", "text": "会启瑜伽最胜缘，觉皇垂范利人天。。经宣秘典超涂炭，教演真乘救倒悬。。阿难尊者因习定，救苦观音示面燃。。兴慈济物真三昧，感果叨恩万古传。。吉祥会启，甘露门开。孤魂佛子降临来，闻法赴香斋。永脱轮回，幽暗一时开。"}, {"id": 5, "title": "南无云来集菩萨摩诃萨（三称）", "text": "此一瓣香，不从天降，岂属地生。两仪未判之先，根源充塞三界；一气才分之后，枝叶遍满十方。超日月之光华，夺山川之秀丽。即戒即定即慧，非木非火非烟。收来在一微尘，散去普熏法界。爇向炉中，专申供养：常住三宝，刹海万灵，历代祖师，一切圣众；河沙品类，幽显圣凡，悉仗真香，普同供养。"}, {"id": 6, "title": "南无香云盖菩萨摩诃萨（三称，下同）", "text": "佛面犹如净满月，亦如千日放光明。。圆光普照于十方，喜舍慈悲皆具足。"}, {"id": 7, "title": "南无尽虚空、遍法界、过(去)现(在)未来佛法僧三宝。", "text": "南无登宝座菩萨摩诃萨（三称）"}, {"id": 8, "title": "五方五佛大威神，结界降魔遍刹尘。", "text": "今宵毗卢冠上现，一瞻一礼总归真。"}, {"id": 9, "title": "稽首皈依苏悉帝，头面顶礼七俱胝。", "text": "我今称赞大准提，唯愿慈悲垂加护。。南无飒哆(da)喃，三藐三菩陀，俱胝喃，怛垤(dia)他：唵(om)，折戾主隶，准提(di)，娑(sa)婆(wa)诃(ha)。"}, {"id": 10, "title": "南无毗卢如来南无毗卢如来", "text": "五方结界"}, {"id": 11, "title": "吽(hong)吽吽唵嘛呢吽", "text": "天上天下无如佛（唵嘛呢吽），十方世界（唵哑吽）亦无比。"}, {"id": 12, "title": "世间所有我尽见（唵嘛呢吽），一切无有（唵哑吽）如佛者。", "text": "大光明藏（吽吽唵嘛呢吽）。东方世界阿閦佛(唵嘛呢吽)，其身青色(唵哑吽)放光明，吽吽唵嘛呢吽，手印执持金刚杵(唵嘛呢吽)，众等志心(唵哑吽)称赞礼，吽吽唵嘛呢吽。。南方世界宝生佛(唵嘛呢吽)，其身赤色(唵哑吽)放光明，吽吽唵嘛呢吽，手印执持摩尼宝(唵嘛呢吽)，众等志心(唵哑吽)称赞礼，吽吽唵嘛呢吽。。西方世界弥陀佛(唵嘛呢吽)，其身白色(唵哑吽)放光明，吽吽唵嘛呢吽，手印执持妙莲花(唵嘛呢吽)，众等志心(唵哑吽)称赞礼，吽吽唵嘛呢吽。。北方世界成就佛(唵嘛呢吽)，其身黑色(唵哑吽)放光明，吽吽唵嘛呢吽，手印执持轮相交(唵嘛呢吽)，众等志心(唵哑吽)称赞礼，吽吽唵嘛呢吽。。中央毗卢遮那佛(唵嘛呢吽)，其身黄色(唵哑吽)放光明，吽吽唵嘛呢吽，手印执持千辐轮(唵嘛呢吽)，众等志心(唵哑吽)称赞礼，吽吽唵嘛呢吽。。户唵萨哩斡(wa)，怛他阿夜多。布思必度必，阿噜吉干的。你尾的舍不答，步拶(za)铭葛(ga)。萨谟的啰(ra弹舌音)，斯癹(ba)啰纳。三麻哑吽。"}, {"id": 13, "title": "南无宝昙华菩萨摩诃萨（三称）", "text": "夫以登瑜伽显密之座，六度齐修；开济物利生之门，三坛等施。一心湛寂，全身总是大悲王，三业应兮，脱体共成“纥哩”字。果然如是，则是因是果，不出自心；自利利他，岂关余物。化滴水作长河之酥酪；变微食为大地之斛食。于倏忽际，普济大地之饥虚；在顷刻间，利益河沙之鬼趣。若也如是会得，便当普利群机；其或未然，不免重宣妙偈，所谓道：。尘尘刹刹尽圆融，万别千差一贯通。。拈起珊瑚枝上月，光明炯炯照无穷。"}, {"id": 14, "title": "加持十度真言：", "text": "唵。斡(wa)资啰(二合zra)。阿萨奈。吽。"}, {"id": 15, "title": "次结观音禅定印", "text": "唵。斡资啰。那恰哑。吽。"}, {"id": 16, "title": "南无阿嵯耶观音菩萨", "text": "智慧宏深大辩才，端居波上绝尘埃。"}, {"id": 17, "title": "祥光烁破千生病，甘露能除万劫灾。", "text": "翠柳拂开金世界，红莲涌出玉楼台。"}, {"id": 18, "title": "我今称赞无穷尽，愿向人间应现来。", "text": "南无阿嵯耶观音菩萨"}, {"id": 19, "title": "南无观世音菩萨南无观世音菩萨甘露门开", "text": "10日1h11m34s。海震潮音说普门，九莲花里现同真。杨枝一滴真甘露，散作山河大地春。。夫此水者，八功德水自天真，先洗众生业垢尘。遍入毗卢华藏界，个中无处不超沦。水不洗水，妙契法身；尘不染尘，反资自己。蠲(juan)除器界，荡涤坛场。洒枯木以再逢春，洁秽邦而成净土，所谓：内外中间无浊秽，圣凡幽显总清凉。教有真言，谨当持诵。"}, {"id": 20, "title": "(大众同声诵《大悲神咒》，毕，表白举)。", "text": "南无甘露王菩萨摩诃萨！。瓶中甘露如来置，要去尘劳不净身。我今乞取掌中存，普洒法筵常清净。"}, {"id": 21, "title": "净法界真言：", "text": "唵(om)囕(lan)唵囕莎(suo)诃(ha)。点净真言：。唵。阿穆葛(ga)拶(za)啰(ra)弥麻迎。苏噜苏噜。莎诃。"}, {"id": 22, "title": "加持花米真言：", "text": "唵。斡资啰。喷弥哑。吽。"}, {"id": 23, "title": "加持铃杵真言：", "text": "唵。斡资啰。萨答哑。吽。"}, {"id": 24, "title": "唵。斡资啰。看吒哑。吽。（三诵三撒米）", "text": "我今振铃杵，声遍十方处。礼请诸圣贤，悉皆来赴会。"}, {"id": 25, "title": "此乃一切诸如来手中执持金刚杵", "text": "金刚佛母大勇识我亦恒常而执持"}, {"id": 26, "title": "愿灭有情大愚痴唵贺啰贺啰吽(三遍)", "text": "左手执持微妙七宝铎,洪音振动十方及三际。梵音嘹亮惊觉魔冤心,摧碎邪妖魍魉诸鬼魅。右手执持金刚降魔杵,威势力重八万四千斛。摧坏天与非天魔眷属,普使回光返照而渴仰"}, {"id": 27, "title": "内外魔冤三毒四害等,咒咀魇祷波旬及外道", "text": "三尖火轮遣魔遍空力,能使颠倒梦想皆远离。四方八面忿怒诸天魔,闻我作法谛听而信受。唧芒叭怛秘密妙伽陀,弹指扫荡凶恶及祸崇"}, {"id": 28, "title": "十二因缘咒", "text": "唵。耶答儿麻兮都。不啰巴斡(wa)兮。敦的山，答塔葛答歇。斡怛的山，拶(za)约尼噜。怛耶邦叭谛。麻曷释啰，麻纳耶。莎诃。。我及法界，一切有情，从今为始，乃至未证菩提之间，誓愿归依金刚上师三宝。。上师三宝真言：。囊谟孤噜毗耶。捺谟勃塔耶。捺谟达而麻耶。捺谟桑渴耶。"}, {"id": 29, "title": "唵。哩哩哈哈吽吽癹(ba)怛。", "text": "唵。失哩麻哈歌啰哈哈吽吽癹怛。莎诃。唵哑吽。"}, {"id": 30, "title": "自性偈", "text": "方便自性不坏体，金刚不坏大勇识。最胜无比超出相，今此所作皆成就。。胜会自性甚深性，演说最上法-轮音。以今生现方便身，今此所作愿得成。"}, {"id": 31, "title": "净地偈", "text": "一切方隅所有地，斡砾砂碛等皆无。琉璃宝地平如掌，柔软微妙愿安住。。犹如极乐国庄严，妙宝为地众花敷。园林池沼无缺少，以大法音愿具足。。从出世间无能现，种种七宝之所成。无量光明遍照处，诸佛菩萨愿安住。。苦火逼恼诸众生，悲水清凉得寂静。隐至自性安乐趣，圣观自在我赞礼。。稽首最胜诸上师，无尽三宝圣观音。我今依教济幽冥，惟愿慈悲垂加护。"}, {"id": 32, "title": "音乐咒", "text": "唵。斡(wa)资啰，看支夷。啰纳啰纳。不啰啰纳，不啰啰纳。三不啰啰纳，三不啰啰纳。萨哩斡，孛(bo)塔赤的啰。不啰拶(za)哩答。麻曷不啰尼牙。巴啰蔑答那达，速巴微。萨哩斡，塔哩麻纥(he)哩达耶。伞多沙那。葛哩，吽吽。癹(ba)吒，莎诃(ha)。。缘起文。切以法不孤起，仗境方生。道不虚行，遇缘即应。今则罗列华坛，阐扬佛事。香焚宝篆，腾五色之云霞；烛绽金莲，灿一天之星斗。法乐奏无生之曲，梵音演最上之宗。归依五眼六通，迎请千贤万圣。由是觉王住世，以法利生。不有因缘，无由垂范。是以阿难尊者，林间习定。夜见鬼王，口吐火焰，顶发烟生。身形丑恶，肢节如破车之声；饥火交燃，咽喉似针锋之细。见斯怪异，问是何名。答曰面然。汝三日之中，当堕我类。阿难惊怖，归投大觉慈尊，叙说前因，启请救苦之法。佛垂方便，利济洪深，使延年而益寿，诵威德之真诠。令饿鬼以充资，施甘露之法食。加持必专于神咒，严卫须假于坛仪。虽然启请一时，法传千古。金山修建，不烛自明。摩伽斛食，施周法界。若无灵验，今古焉传。有是功勋，方堪演说。梵音演处，上穷有顶之天；唐韵宣时，下极风轮之际。欲明圣理，故白斯文。佛事完成，同归真际。偈云：。最胜光明自在王，如来宣演妙难量。。昔因庆喜生惶怖，焰口雷音报祸殃。。稽首殷勤白教主，兴慈济物利生方。（参考师父的法本）。如今稽古重拈出，凡圣同游解脱场。。阿难陀尊者阿难陀尊者兴权启教。夫三宝者，千生罕遇，万劫难逢。归依者，福增无量；礼念者，罪灭河沙。譬如灵丹之妙，药疗百病以蠲除。若以肯切至诚心，故无求而不应。所谓道：冥冥大夜中，三宝为灯烛；涛涛苦海内，三宝为舟航；焰焰火宅中，三宝为雨泽。由是希心仰望，当求出世之因；密语宣扬，定感超凡之果。三宝功德，难尽赞扬。仰劳众师，慈音后和。（礼赞佛法僧三宝）。志心信礼，佛陀耶，两足尊，三觉圆，万德具。"}, {"id": 33, "title": "天人调御师（唵哑吽），凡圣大慈父。从真界，腾应质，悲化普。", "text": "竖穷三际时，横遍十方处。震法雷，鸣法鼓。。广演权实教（唵哑吽），大开方便路。若归依，能消灭、消灭地狱苦。。志心信礼，达摩耶，离欲尊，宝藏收，玉函轴。"}, {"id": 34, "title": "结集于西域（唵哑吽），翻译传东土。祖师弘，贤哲判，成章疏。", "text": "三乘分顿渐，五教定宗趣。鬼神钦，龙天护。。导迷标月指（唵哑吽），除热真甘露。若归依，能消灭、消灭饿鬼苦。。志心信礼，僧伽耶，众中尊，五德师，六和侣。"}, {"id": 35, "title": "利生为事业（唵哑吽），弘法是家务。避嚣尘，常宴坐，寂静处。", "text": "遮身服毳衣，充腹采薪薇。钵降龙，锡解虎。。法灯常遍照（唵哑吽），祖印相传付。若归依，能消灭、消灭旁生苦。。（此处有大段需参考师父的法本）。遣魔印"}, {"id": 36, "title": "唵。斡资啰，阿弭哩达。昆吒利，曷纳曷纳。吽吽，癹吒。", "text": "伏魔印"}, {"id": 37, "title": "唵。斡资啰，奴恰哑，吽。", "text": "次结火轮印。唵。斡资啰，佐啰哑奈辣。曷奈答曷。巴拶(za)么搭。班拶啰纳。吽。癹吒。"}, {"id": 38, "title": "次结真空咒印", "text": "唵。莎癹斡，顺尼牙。萨哩斡，塔哩麻。莎癹(ba)斡，顺尼牙达。。于空性中想，普隆，普隆，普隆。哑，哑，哑。吽，吽，吽。而成十方世界。所有天妙曼怛哑哩干濯足，花、香、灯、涂、食、乐，清彻无碍，犹如普贤化现，种种云集供养，遍满虚空，充塞法界，尽轮回际，无有间断。"}, {"id": 39, "title": "唵。萨哩斡，答塔葛达。萨叭哩斡啰。巴啰谛拶耶。莎诃。", "text": "唵。萨哩斡，答塔葛达。萨叭哩斡啰。"}, {"id": 40, "title": "唵。斡资啰，布思必哑，吽。", "text": "唵。萨哩斡，答塔葛达。萨叭哩斡啰。"}, {"id": 41, "title": "唵。斡资啰，度必哑，吽。", "text": "唵。萨哩斡，答塔葛达。萨叭哩斡啰。"}, {"id": 42, "title": "唵。斡资啰，阿鲁吉哑，吽。", "text": "唵。萨哩斡，答塔葛达，萨叭哩斡啰。"}, {"id": 43, "title": "唵。斡资啰，干底哑，吽。", "text": "唵。萨哩斡，答塔葛达。萨叭哩斡啰。"}, {"id": 44, "title": "唵。斡资啰，你微的哑。吽。", "text": "唵。萨哩斡，答塔葛达。萨叭哩斡啰。。唵。斡资啰，舍不答。步拶弥葛，萨膜的啰。斯癹(ba)啰纳，三麻耶哑。吽。。唵。斡资啰，看支夷。啰纳啰纳，不啰啰纳，不啰啰纳。三不啰啰纳，三不啰啰纳。萨哩斡，孛答赤的啰。不啰拶哩达。麻曷不啰，尼牙巴啰。蔑答那达，速吧微。萨哩斡，塔哩麻，纥哩达耶，伞多沙纳。葛哩吽吽。癹吒。莎诃。。六字大明王，功熏不可量。现前清净众，异口共宣扬。"}, {"id": 45, "title": "唵嘛呢叭弥吽（念108遍）。", "text": "愿将以此胜功德，回向法界诸有情。。普愿沉溺诸众生，速往无量光佛刹。"}, {"id": 46, "title": "唵。斡资啰，麻明哑。吽。", "text": "唵。斡资啰，乌怛葛哑。吽。"}, {"id": 47, "title": "唵。斡资啰，普弥哑。吽。", "text": "轮围山铁围山"}, {"id": 48, "title": "唵。斡资啰，哩契哑。吽。", "text": "金刚地胜金刚地基吽字而作拥护。南北东西四部洲，百千刹土亦能酬。须弥顶上安宫殿，大地孤魂脱苦丘。"}, {"id": 49, "title": "唵。唅弥啰微捺麻。(大须弥山)", "text": "唵。唅斯克彻麻弥啰微捺麻。(小须弥山)"}, {"id": 50, "title": "唵。岩晡儿斡微的葛耶捺麻。(东胜神洲)", "text": "唵。岩的葛耶捺麻。(小胜神洲)"}, {"id": 51, "title": "唵。岩微的葛耶捺麻。(胜胜神洲)", "text": "唵囕。咱晡的癹(ba)耶捺麻。(南赡部洲)"}, {"id": 52, "title": "唵囕。沙茶耶捺麻。(谄胜洲)", "text": "唵囕。乌答啰曼的哩尼耶捺麻。(最胜洲)"}, {"id": 53, "title": "唵嚂。阿咓啰孤答尼耶捺麻。(西牛贺洲)", "text": "唵嚂。拶(za)麻啰耶捺麻。(小拂洲)"}, {"id": 54, "title": "唵嚂。斡啰拶麻啰耶捺麻。(妙拂洲)", "text": "唵鑁(wan)。乌答啰孤啰尼捺麻。(北俱卢州)"}, {"id": 55, "title": "唵鑁。孤啰微捺麻。(小行洲)", "text": "∴唵鑁。葛啰斡耶捺麻。(胜道行洲)"}, {"id": 56, "title": "唵。岩葛拶啰的捺耶捺麻。(象宝)", "text": "唵囕。喷噜沙啰唽的捺耶捺麻。(主藏宝)"}, {"id": 57, "title": "唵囕。斡节啰的捺耶捺麻。(马宝)", "text": "唵鑁。斯的哩啰的捺耶捺麻。(女宝)"}, {"id": 58, "title": "唵。岩葛吒葛啰的捺耶捺麻。(将军宝)", "text": "唵囕。吒吃啰啰的捺耶捺麻。(轮宝)"}, {"id": 59, "title": "唵囕。麻尼啰的捺耶捺麻。(如意宝)", "text": "∴唵鑁。麻曷聂塔捺耶捺麻。(宝藏瓶)"}, {"id": 60, "title": "唵。阿斯哩牙耶捺麻。(日宫)", "text": "唵嚂。拶的啰耶捺麻。(月宫)"}, {"id": 61, "title": "唵哑吽。捺麻。(众宝伞)", "text": "∴唵。萨哩斡啰的尼毗药捺麻。(尊胜幢)。唵。室哩麻忒(te)。斡资啰。孤噜拶啰。捺葛麻辣耶。三藐克答捺，阿斡癹。萨拏葛啰耶。吽。捺麻。"}, {"id": 62, "title": "人天所有种种供物", "text": "次遣宝错花米摄受。"}, {"id": 63, "title": "唵。斡资啰拽乞彻。吽。", "text": "唵。斡资啰萨答哑。吽。"}, {"id": 64, "title": "唵哑吽。", "text": "四宝所成须弥峰，神州并及小洲等，。日月八宝为妙供，我今奉献无上尊。。唵。斯麻啰，斯麻啰。密嘛曩，斯葛啰。摩诃拶葛啰。吽。（七遍）"}, {"id": 65, "title": "唵。萨不答啰的捺。吽。（三诵三撒米）", "text": "谛想清净广大曼答辣，四洲充满无量诸珍宝；。一一皆如妙高摩尼聚，奉献上师三宝愿安住。。我今依教建立曼答辣，量等虚空金刚为宝地；。字字密言惟心之所成，须弥日月七宝四天下。。衣服伞盖技乐幢幡云，宝座珍馐楼阁并宫殿；。池沼园林名花普遍布，奉献上师三宝护神等。。惟愿慈悲纳受生欢喜，屏除魔碍集福施安宁；。今宵施主所求皆如意，尽未来际吉祥无间断。。唵。萨哩斡，答塔葛达啰的捺麻曷曼答辣。布拶铭葛萨谟的啰斯癹(ba)啰纳三麻哑吽。。唵。斡资啰，看支夷。啰纳啰纳，不啰啰纳，不啰啰纳。三不啰啰纳，三不啰啰纳。萨哩斡，孛答赤的啰。不啰拶哩答。麻曷不啰，尼牙巴啰。蔑答那达，速吧微。萨哩斡，塔哩麻。纥哩达耶，伞多沙纳。葛哩吽吽。癹吒。莎诃。。先结大轮明王印，加持坛场悉清净。我今依教诵密言，令此所作皆成就。"}, {"id": 66, "title": "默念大轮明王咒七遍：", "text": "捺麻斯得哩野，脱夷葛(ga)南。萨哩斡，怛塔葛达南。唵。微啰积，微啰积。麻曷拶(za)葛啰。斡资哩，斡资哩。萨怛萨怛。萨啰谛萨啰谛。得啰夷得啰夷。微驮麻尼，三攀拶纳祢。得啰麻祢的，席塔乞哩。得兰颜席提，脱夷。莎诃。。众等发广大心，归依金刚上师，归依佛，归依法，归依僧。我今发心，不为自求，人天福报，声闻缘觉，乃至权乘诸位菩萨。唯依最上乘，发菩提心。愿与法界众生，一时同得阿耨多罗三藐三菩提。。稽首十方调御师，演扬清净微妙法，。三乘四果解脱僧，愿赐慈悲临法会。"}, {"id": 67, "title": "奉请三宝", "text": "香花迎香花请。南无一心奉请：尽十方，遍法界，微尘刹土中，诸佛法僧，金刚密迹，卫法神王，天龙八部，婆罗门仙，一切圣众。惟愿不违本誓，怜愍有情，此夜今时，光临法会。"}, {"id": 68, "title": "香花迎香花请", "text": "罗列香花建宝坛，重重佛景一毫端。。心融妙理虚空小，道契真如法界宽。。相好慈悲秋月满，化身腾处暮云繁。。香烟堆里瞻应现，万象森罗海印含。"}, {"id": 69, "title": "释迦如来释迦如来证盟功德", "text": "弥陀如来弥陀如来同垂加护"}, {"id": 70, "title": "观世音菩萨观世音菩萨慈悲摄受", "text": "谨依瑜伽教，建立曼答辣。惟愿三宝尊，慈悲哀纳受。"}, {"id": 71, "title": "印现坛仪", "text": "唵。斡资啰，拶(za)格啰。吽。拶吽。邦斛。"}, {"id": 72, "title": "同诵三十五佛(见朝暮课诵)", "text": "毗卢遮那佛，愿力周法界。一切国土中，恒转无上轮。。大众默念《心经》一遍。启告十方，一切诸佛，般若菩萨，金刚天等。及诸业道，无量圣贤。我今众等，以大慈悲，乘佛神力，召请十方，尽虚空界，三涂地狱，诸恶趣中，旷劫饥虚，一切饿鬼。阎罗诸司，天曹地府，业道冥官，婆罗门仙。久远先亡，旷野冥灵，虚空诸天，及诸眷属，异类鬼神。。惟愿诸佛，般若菩萨，金刚天等，无量圣贤，及诸业道，愿赐威光，悲增护念。普愿十方，尽虚空界，天曹地府，业道冥官，无量饿鬼。多生父母，先亡久远，婆罗门仙。一切怨家，负于财命，种种类族，异类鬼神，各及眷属，乘如来力，于此时中，决定降临，得受如来上妙法味，清净甘露。饮食充足，滋润身田，福德智慧，发菩提心，永离邪行。归敬三宝，行大慈悲，利益有情，求无上道。不受轮回，诸恶趣果，常生善家，离诸怖畏。身常清净，证无上道；口常清净，证无上道；意常清净，证无上道。。十方一切刹，诸佛菩萨众，无量诸圣贤，及诸业道官。。惟愿大慈悲，降临于法会，摄受花香灯涂果乐，微分少供养。（拈米向外散撒）。吽字涌出花(香灯涂果乐，各唱一遍)天母，一面四臂放光明。。上二手印持妙花(香灯涂果乐)，下二手印轮相交。"}, {"id": 73, "title": "吽唵哑吽唵麻呢吽纥哩(二合)", "text": "妙花(香灯涂果乐)天母供养佛，愿佛慈悲哀纳受。。因缘自性所出生，所有种种微妙花(香灯涂果乐)，。奉献上师三宝尊，惟愿慈悲哀纳受。。户唵萨哩嚩(wa)，怛他誐(ge)多耶。布思必度必，阿噜吉干的。你微的，舍不答，布拶(za)弥渴。萨谟的啰，斯癹(ba)啰纳。三麻耶哑，吽。"}, {"id": 74, "title": "南无普供养菩萨摩诃萨（三称）", "text": "我以普贤行愿力，修设花香灯涂食。。微尘刹土诸圣贤，一一遍礼皆供养。。次结运心供养印。曩谟萨哩斡，答塔葛达毗牙。尾说穆契毗牙。唵。萨哩斡哩塔，乌忒葛的。斯癹(ba)啰纳兮幔。葛葛捺龛，莎诃。"}, {"id": 75, "title": "我以志诚心，奉献甘露食。惟愿三宝尊，遣魔哀纳受。", "text": "次结遣魔印"}, {"id": 76, "title": "唵。斡资啰，拽乞彻。吽。", "text": "我以佛神力，依教诵密言，加持甘露食，遍满虚空界。"}, {"id": 77, "title": "次结变空咒印", "text": "唵。莎癹(ba)斡秫塔。萨哩斡，塔哩麻，莎癹斡秫徒坎。唵哑吽。"}, {"id": 78, "title": "以此甘露食，奉献诸圣贤，怜愍我等故，慈悲哀纳受。", "text": "次结奉食印。唵。阿葛鲁穆看。萨哩斡，塔哩麻。南哑牒耶奴忒，班答奴忒。唵哑吽。癹吒，莎诃。"}, {"id": 79, "title": "我今奉献甘露食，量等须弥无过上；", "text": "色香味美遍十方，上师三宝哀纳受。。次供显密护神等，后及法界诸众生；。受用饱满生欢悦，屏除魔碍施安宁。。今宵施主眷属等，消灾集福寿延长；。所求如意皆成就，一切时中愿吉祥。。世尊大慈妙庄严，明解圆满一切智；"}, {"id": 80, "title": "能施福慧如大海，与诸如来我赞礼。", "text": "自性本体离诸欲，能依此行脱苦趣；"}, {"id": 81, "title": "以为甚深玄妙理，与诸妙法我赞礼。", "text": "解脱道中胜解脱，持净戒行堪恭敬；"}, {"id": 82, "title": "胜妙福田生胜处，与彼大众我赞礼。", "text": "普陀洛伽常入定，随缘赴感靡不周。。寻声救苦度群迷，故号名为观自在。"}, {"id": 83, "title": "次结观音禅定印", "text": "唵。斡资啰，塔啰麻纥哩。"}, {"id": 84, "title": "南无无尽三宝尊，我今誓发菩提心，", "text": "惟愿菩萨来摄受，速证观音微妙身。。次入观音三摩地，澄心闭目观心中，。圆满皎洁净月上，字种放光成莲华。。华中有一观自在，相好具足无比对。。左手执持妙莲华，右手于叶作开势。。菩萨思惟有情身，各具觉悟之莲华。。清净法界无惑染，八叶各有一如来。。如来入定跏趺坐，各各面向观自在，。项臂圆光身金色，光明朗照极晃耀。。次想其华渐舒大，其量周遍虚空界。。思彼觉华照法界，如来海会共广大。。心若不移于此定，怜愍一切诸众生；。觉华蒙照脱苦恼，便同菩萨观自在。。莲花渐收同己量，复结自在观音印；"}, {"id": 85, "title": "加持四处诵密言，自身亦等观自在。", "text": "以此禅定胜功德，回向法界诸有情；。同见西方无量光，成就普贤广大愿。"}, {"id": 86, "title": "唵。斡资啰。塔啰麻纥哩。", "text": "若人欲了知，三世一切佛。应观法界性，一切惟心造。"}, {"id": 87, "title": "次结破地狱印", "text": "捺麻阿瑟吒，瑟吒摄谛喃，三藐三勃塔，俱胝喃。唵。撮辣纳，嚩婆细，提哩提哩。吽。"}, {"id": 88, "title": "由此印咒威神力故，所有诸趣，地狱之门，随此印咒，豁然自开。", "text": "地藏十王起哀怜，揭案消名纳善缘。。亡者须仗如来教，愿凭法力判生天。"}, {"id": 89, "title": "奉请地藏王菩萨摩诃萨", "text": "香花迎香花请。南无一心奉请，众生度尽，方证菩提，地狱未空，誓不成佛。今当奉请：。幽冥教主本尊地藏王菩萨摩诃萨。惟愿不违本誓，怜愍有情，此夜今时，光临法会。。香花迎香花请。南无一心奉请，手擎幡盖，身挂花幔，导众生归极乐之邦，引孤魂赴道场之会。今当奉请：。幽冥路上引魂王菩萨摩诃萨。惟愿不违本誓，怜愍有情，此夜今时，光临法会。"}, {"id": 90, "title": "以此振铃伸召请，孤魂闻召愿来临。", "text": "仗承三宝加持力，此夜今时临法会。。运心平等，法力无边。恭对寒林前，称扬宝号：。南无多宝如来。南无宝胜如来。南无广博身如来。南无妙色身如来。南无离怖畏如来。南无甘露王如来。南无阿弥陀如来。曩谟薄伽伐谛。。咒声直上寒云霄，路迢迢，罗汉生欢皆除怨。唵。苏宁以围绕，户唵必知。必舍左曩，夷西夷西。萨哩斡，母陀喃，莎诃。。秋雨梧桐叶落时，夜痴痴，召请孤魂来赴会。唵。承此上莲台，户唵必知。必舍左曩，夷西夷西。萨哩斡，母陀喃，莎诃。。今夜道场法筵开，惠然来，召请亡灵来赴会。唵。樵楼鼓交悲，户唵必知。必舍左曩，夷西夷西。萨哩斡，母陀喃，莎诃。"}, {"id": 91, "title": "唵。步步帝利，伽哩哆利，怛他也都耶。", "text": "当斋宗亲孤魂，闻召远来临。。--------------------------------------------------------------------------------。一心召请，金乌似箭，玉兔如梭。想骨肉以分离，睹音容而何在。初爇名香，初伸召请，某氏灵魂。惟愿承三宝力，仗秘密言。此夜今时，来临法会，受此无遮甘露法食。。一心召请，远观山有色，近听水无声，春去花还在，人来鸟不惊。二爇名香，二伸召请，某氏灵魂。。一心召请，浮生如梦，幻质匪坚。不凭我佛之慈，曷遂超升之路。三爇名香，三伸召请，某氏灵魂（各家本宅，祠堂之内，爱及法界之中，大地山河之内。四生六道，八难三途，有无二主，孤魂佛子等众。惟愿承三宝力，仗秘密言，此夜今时，来受无遮甘露法食。）。师父唱了探亡调，2H53M，焰口1月10日。。一心召请，累朝帝主，历代侯王。九重殿阙高居，万里山河独据。西来战舰，千年王气俄收；北去銮舆，五国怨声未断。呜呼，杜鹃叫落桃花月，血染枝头恨正长。如是前王后伯之流，一类孤魂等众。。一心召请，筑坛拜将，建节封侯。力移金鼎千钧，身作长城万里。霜寒豹帐，徒勤汗马之劳；风息狼烟，空负攀龙之望。呜呼，将军战马今何在，野草闲花满地愁。如是英雄将帅之流，一类孤魂等众。。一心召请，五陵才俊，百郡贤良。三年清节为官，一片丹心报主。南州北县，久离桑梓之乡；海角天涯，远丧蓬莱之岛。呜呼，官贶萧萧随逝水，离魂杳杳隔阳关。如是文臣宰辅之流，一类孤魂等众。。一心召请，黉门才子，白屋书生。探花足步文林，射策身游棘院。萤灯飞散，三年徒用工夫；铁砚磨穿，十载漫施辛苦。呜呼，七尺红罗书姓字，一抔黄土盖文章。如是文人举子之流，一类孤魂等众。。一心召请，出尘上士，飞锡高僧。精修五戒净人，梵行比丘尼众。黄花翠竹，空谈秘密真诠；白牯黧奴，徒演苦空妙偈。呜呼，经窗冷浸三更月，禅室虚明半夜灯。如是缁衣释子之流，一类觉灵等众。。一心召请，黄冠野客，羽服仙流。桃源洞里修真，阆苑洲前养性。三花九炼，天曹未许标名；四大无常，地府难容转限。呜呼，琳观霜寒丹灶冷，醮坛风惨杏花稀。如是玄门道士之流，一类遐灵等众。。一心召请，江湖羁旅，南北经商。图财万里游行，积货千斤贸易。风霜不测，身膏鱼腹之中；途路难防，命丧羊肠之险。呜呼，滞魄北随云黯黯，客魂东逐水悠悠。如是他乡客旅之流，一类孤魂等众。。一心召请，戎衣战士，临阵健儿。红旗影里争雄，白刃丛中敌命。鼓金初振，霎时腹破肠穿；胜败才分，遍地肢伤首碎。呜呼，漠漠黄沙闻鬼哭，茫茫白骨少人收。如是阵亡兵卒之流，一类孤魂等众。。一心召请，宫帷美女，闺阁佳人。胭脂画面争妍，龙麝薰衣竞俏。云收雨歇，魂消金谷之圆；月缺花残，肠断马嵬之驿。呜呼，昔日风流都不见，绿杨芳草躅髅寒。如是裙钗妇女之流，一类孤魂等众。。一心召请，怀耽十月，坐草三朝。初欣鸾凤和鸣，次望熊罴叶梦。奉恭欲唱，吉凶只在片时；璋瓦未分，母子皆归长夜。呜呼，花正开时遭急雨，月当明处覆乌云。如是血湖产难之流，一类孤魂等众。。一心召请，戎夷蛮狄，喑哑盲聋。勤劳失命佣奴，妒忌伤身婢妾。轻欺三宝，罪愆积若河沙；杵逆双亲，凶恶浮于宇宙。呜呼，长夜漫漫何日晓，幽关隐隐不知春。如是冥顽悖逆之流，一类孤魂等众。。一心召请，饥寒丐者，刑戮囚人。遇水火以伤身，逢虎狼而失命。悬梁服毒，千年怨气沉沉；雷击崖崩，一点惊魂漾漾。呜呼，暮雨青烟寒鹊噪，秋风黄叶乱鸦飞。如是伤亡横死之流，一类孤魂等众。。一心召请，法界六道，十类孤魂。面然所统，薜荔多众。尘沙种类，依草附木，魑魅魍魉，滞魄孤魂。自他先亡，家亲眷属等众。惟愿承三宝力，仗秘密言，此夜今时，来受无遮甘露法食。。上来召到，诸鬼神等。至心合掌，俯伏低头。勿得语笑喧哗，切忌粗心胆大。威仪齐整，动止安祥。听我金刚上师，一一宣扬；为汝水陆有情，重重忏悔。既是今日，有缘有分；法王座上，无党无偏。举眼直下承当，更莫疑心错过。归依佛，永不退道心；授法印，而齐成正觉。清凉境内，可以各上莲池；极乐国中，自此同登彼岸。将当召请，悉愿来临。众等虔诚，今当赞咏。"}, {"id": 92, "title": "稽首皈依雄，水月金容。住海岸，在阎浮，运广慈心重。", "text": "发宏誓愿，度脱樊笼。弥陀宝冠，缨络顶戴花玲珑。。三灾八难，寻声救苦。杻械枷锁，化作清风。"}, {"id": 93, "title": "散珍宝，普济贫穷。杨枝手内，时时洒滴甘露，润在亡者喉中。", "text": "惟愿今宵临法会，接引亡灵，上往天宫。"}, {"id": 94, "title": "南无步部帝哩伽哩哆利，怛都也他耶。荐往生菩萨摩诃萨！", "text": "修设斋筵，阿难因缘起。救苦观音，示现焦面鬼。"}, {"id": 95, "title": "念佛宣扬，秘密功德力；拔济孤魂，来受甘露味。", "text": "枉死城中，飒飒悲风起；鬼门关前，叫苦声动地。"}, {"id": 96, "title": "有主无依，十类孤魂鬼；专等今宵，来受甘露味。", "text": "八寒八热，泥犁阿鼻狱；杻械枷锁，严刑多苦具。"}, {"id": 97, "title": "鲜血淋身，虎咬悲惨凄；此等孤魂，来受甘露味。", "text": "饥火烟炎，历劫烧身体；因地悭贪，果报多此类。"}, {"id": 98, "title": "腹如沧海，喉似针锋细。此夜今时，来受甘露味。", "text": "象马驼驴，鳞甲羽毛类；屠割剥裂，生死无边际。"}, {"id": 99, "title": "互食互偿，自受谁人替。此等孤魂，来受甘露味。", "text": "王侯将相，九流并百艺。逐日贪瞋，彼此诤闲气。"}, {"id": 100, "title": "一旦无常，受苦无人替。此夜今时，来受甘露味。", "text": "瞋心布施，堕在修罗类。虽与天同，恶心嫉妒炽。"}, {"id": 101, "title": "与天相诤，受苦无穷际。此等孤魂，来受甘露味。", "text": "二十八天，受乐无比对。未悟真常，同居三界内。"}, {"id": 102, "title": "寿尽天年，还如轮回趣。此等孤魂，来受甘露味。", "text": "近代先朝，帝主尊荣位。勋戚侯王，玉叶金枝贵。"}, {"id": 103, "title": "宰执中宫，彩女嫔妃类。梦断华胥，来受甘露味。", "text": "国士朝臣，经纬匡时世。牧化黎民，未遂忠良志。"}, {"id": 104, "title": "失宠怀忧，谪降边邦地。恋国游魂，来受甘露味。", "text": "武将戎臣，统领三军队。结阵交锋，锣鼓喧天地。"}, {"id": 105, "title": "北战南征，失陷沙场内。为国捐躯，来受甘露味。", "text": "学古穷今，锦绣文章士。映雪偷光，苦志寒窗内。"}, {"id": 106, "title": "命运蹉跎，金榜无名字。郁郁幽魂，来受甘露味。", "text": "割爱辞亲，早入空门内。访道寻师，只为超生死。。暑往寒来，不觉无常至。返照回光，早证菩提位。。羽服黄冠，早发修真志。炼药烧丹，养性还元气。"}, {"id": 107, "title": "苦行劳神，指望登仙位。莫恋形魂，来受甘露味。", "text": "孝子贤孙，义勇忠良志。烈女贞妻，视死如归去。"}, {"id": 108, "title": "仗节忘躯，千古留英气。耿耿灵魂，来受甘露味。", "text": "女道尼流，身住黄金地。鸾凤缘空，不染人间事。"}, {"id": 109, "title": "未了无为，流浪虚生死。清净幽魂，来受甘露味。", "text": "地理天文，医药阴阳类。卜卦占龟，风鉴并星士。"}, {"id": 110, "title": "报吉谈凶，难免无常对。舍伪归真，来受甘露味。", "text": "坐贾行商，种种经营辈。艺术多能，贸易求财利。"}, {"id": 111, "title": "背井离乡，死在他方地。旅梦悠悠，来受甘露味。", "text": "犯法遭刑，牢狱长幽系。负命谋财，债主怨家类。"}, {"id": 112, "title": "恶疾天灾，冻死饥亡辈。速离黄泉，来受甘露味。", "text": "马踏车伤，墙压身形碎。鬼击雷轰，自刎悬梁缢。"}, {"id": 113, "title": "水火焚漂，虎咬蛇伤类。九横孤魂，来受甘露味。", "text": "饮血茹毛，生长蛮夷地。负债赏劳，婢妾并奴隶。"}, {"id": 114, "title": "喑哑盲聋，残疾无依怙。受苦怨魂，来受甘露味。", "text": "杵逆爷娘，怨黩天和地。谤佛欺僧，毁像焚经偈。"}, {"id": 115, "title": "邪见深沉，苦报无边际。十恶狂魂，来受甘露味。", "text": "大施门开，荐拔孤魂辈。祖祢先亡，五姓怨家类。"}, {"id": 116, "title": "八难三涂，平等俱超济。仗佛光明，来受甘露味。", "text": "阿弥陀佛，宿有无边誓。观见众生，苦海常漂溺。。垂手殷勤，特驾慈航济。普载众生，同赴莲池会。"}, {"id": 117, "title": "南无莲池海会佛菩萨（三称）", "text": "我以大悲佛神力，召请冥阳诸有情。。旷劫饥虚饿鬼等，不违佛敕来降临。"}, {"id": 118, "title": "次结召请饿鬼印", "text": "唵。即纳即葛，移希夷歇。莎诃。。既召请已，普皆云集，以愍念心，赞叹慰喻。令欢喜已，渴仰于法。善来诸佛子，曾结胜缘故，今遇此佳会，勿得生忧怖。一心渴仰法，不出于此时，戒品而沾身，速令离苦趣。汝等诸佛子，得遇道场中，所有一切罪，召入金刚拳。。次结召罪印。唵。萨哩斡，巴钵羯哩沙拿，尾戌驮纳。斡资啰，萨埵萨麻耶。吽拶。。摧罪诸恶业，由如劫火灭。火灭还曾有，金刚碎微尘。。次结摧罪印。唵。斡资啰，巴尼尾斯普吒耶。萨哩斡，阿巴耶。班塔拿尼，不啰穆恰耶。萨哩斡，阿巴耶，葛谛毗药。萨哩斡，萨埵喃。萨哩斡，答塔葛达。斡资啰，三麻耶。吽。怛啰吒。"}, {"id": 119, "title": "定业不可转，三昧加持力，无始诸障碍，一切皆消灭。", "text": "次结破定业印。唵。斡资啰，葛哩麻，尾束塔耶。萨哩斡，阿瓦啰那你。菩塔萨低夷纳，三麻耶。吽。。罪性本空由心造，心若灭时罪亦亡。心亡罪灭两俱空，此则是名真忏悔。"}, {"id": 120, "title": "次结忏悔灭罪印", "text": "唵。萨哩斡，巴钵尾斯普吒，怛贺纳。斡资啰耶，莎诃。。诸佛子等，既忏悔已。百劫集积罪，一念顿荡除；如火焚枯草，灭尽无有余。一滴清凉水，能除饥与渴；弹洒灌顶门，悉令获安乐。"}, {"id": 121, "title": "次结妙色身如来施甘露印", "text": "曩谟苏噜巴耶，怛他葛哆耶。怛牒他：唵。苏噜，苏噜。钵啰苏噜，钵啰苏噜。莎诃。。汝等自从无量劫，造诸恶业起悭贪。由此业力闭咽喉，仗此密言悉开通。"}, {"id": 122, "title": "次结开咽喉印", "text": "唵。捺谟巴葛瓦谛，尾朴辣，葛得啰耶，答塔葛达耶。。语诸佛子，今为汝等，作印咒已，咽喉自开，通达无碍，离诸障难。。诸佛子等，我今为汝，称赞如来吉祥名号，能令汝等，永离三涂八难之苦，常为如来真净佛子。"}, {"id": 123, "title": "南无宝胜如来。", "text": "捺谟啰怛纳怛啰耶，答塔葛达耶。。诸佛子等，若闻宝胜如来名号，能令汝等，尘劳业火，悉皆消灭。"}, {"id": 124, "title": "南无离怖畏如来", "text": "捺谟微葛怛得啰纳耶，答塔葛达耶。。诸佛子等，若闻离怖畏如来名号，能令汝等常得安乐，永离惊怖，清净快乐。"}, {"id": 125, "title": "南无广博身如来", "text": "捺谟巴葛瓦谛，尾补辣，葛得啰耶，答塔葛达耶。。诸佛子等，若闻广博身如来名号，能令汝等饿鬼，针咽业火停烧，清凉通达。所受饮食，得甘露味。"}, {"id": 126, "title": "南无妙色身如来", "text": "捺谟苏鲁巴耶，答塔葛达耶。。诸佛子等，若闻妙色身如来名号，能令汝等，不受丑陋，诸根具足，相好圆满，殊胜端严。天上人间，最为第一。"}, {"id": 127, "title": "南无多宝如来", "text": "捺谟波虎辣怛纳耶，答塔葛达耶。。诸佛子等，若闻多宝如来名号，能令汝等，具足财宝，称意所须，受用无尽。"}, {"id": 128, "title": "南无阿弥陀如来", "text": "那谟阿弥怛婆耶，答塔葛达耶。。诸佛子等，若闻阿弥陀如来名号，能令汝等，往生西方极乐净土，莲花化生，入不退地，满菩提愿，一生成佛。"}, {"id": 129, "title": "南无世间广大威德自在光明如来", "text": "那谟卢迦委斯谛，令捺弟，唧说啰不啰巴耶，答塔葛达耶。。诸佛子等，若闻世间广大威德自在光明如来名号，能令汝等，获得五种功德：一者于诸世间最为第一；二者得菩萨身，端严殊胜；三者威德广大，超过一切外道天魔，如日照世，显于大海，功德巍巍；四者得大自在，所向如意，似鸟飞空，而无阻碍；五者得大坚固，智慧光明，身心明彻，如琉璃珠。。诸佛子等，此七如来，以誓愿力，拔济众生，永离烦恼，脱三涂苦，安稳常乐。一称其名，千生离苦，证无上道。二称其名，千生离苦，证无上道。三称其名，千生离苦，证无上道。"}, {"id": 130, "title": "次与汝等归依三宝", "text": "归依佛，两足尊。归依法，离欲尊。归依僧，众中尊。。归依佛，不堕地狱。归依法，不堕饿鬼。归依僧，不堕畜生。。汝等佛子，归依佛竟，归依法竟，归依僧竟。。归依三宝故，如法坚固持。自离邪见道，是故志心礼。"}, {"id": 131, "title": "次结三宝印", "text": "唵。婆龛。。南无佛。南无法。南无僧。我今发心，不为自求，人天福报，声闻缘觉，乃至权乘诸位菩萨。唯依最上乘，发菩提心。愿与法界众生，一时同得，阿耨多罗三藐三菩提。。今所发觉心，远离诸性相。蕴处及界等，能取所取执，。诸法悉无我，平等如虚空。自心本不生，空性圆寂故。。如诸佛菩萨，发大菩提心，我亦如是发，是故志心礼。"}, {"id": 132, "title": "次与汝等发菩提心，汝等谛听：", "text": "假使热铁轮，于汝顶上旋，终不为此苦，退失菩提心。"}, {"id": 133, "title": "次结发菩提心印", "text": "唵。菩提。既答没答，巴达野弥。。今为汝等，发菩提心。诸佛子等，当知菩提心者，从大悲起，成佛正因，智慧根本，能破无明，烦恼恶业，不被染坏。"}, {"id": 134, "title": "次与汝等受三昧耶戒", "text": "汝等受佛戒，即入诸佛位。位同大觉已，真是诸佛子。"}, {"id": 135, "title": "次结三昧耶印", "text": "唵。三摩耶，萨埵(dua)鑁(wan)。。今与汝等，受三昧耶戒竟。从今已去，能令汝等，入如来位，是真佛子。从法化生，得佛法分。。汝等冥阳诸有情，吾今施与甘露食。法力加持遍十方，令汝一一皆饱满。。次结无量威德自在光明如来印。唵。萨哩斡，答塔葛达，阿瓦卢揭谛。鑁跋啰，鑁跋啰。三跋啰，三跋啰。吽。。诸佛子等，今为汝等作印咒已，变此一食，为无量食。大如须弥，量同法界，终无能尽。。由此真言力，变食作乳海。普施饿鬼等，身心皆饱满。"}, {"id": 136, "title": "复结前印，诵乳海真言：", "text": "南无三满多，勃驮喃。鑁。。汝诸佛子，今为汝等，作印咒已。由此印咒，加持威力，想于印中，流出甘露，成于乳海，流注法界，普济汝等，一切有情，充足饱满。。汝等业障鬼，变火不能食。今诵秘密言，法食皆饱满。。次结障施鬼印"}, {"id": 137, "title": "唵哑吽。拶(za)辣弥担。萨哩斡，不啰的毗牙。莎诃。", "text": "诸佛子等，虽复方以类聚，物以群分。然我所施，一切无碍，无高无下，平等普遍，不择怨亲。今日勿得以贵轻贱，以强凌弱，拥遏孤幼，令不得食，使不均平，越佛慈济。必须互相爱念，犹如父母忆子之想。汝诸佛子，汝等各有父母、兄弟、姊妹、妻子、眷属、善友、亲戚，或有事缘来不得者，汝等佛子，慈悲爱念，各各赍持饮食钱财物等，递相布施，充足饱满，无有乏少。令发道意，永离三涂，长越四流。当舍此身，速超道果。又为汝等，将此净食，分为三分：一施水族，令获人空；二施毛群，令获法寂；三施他方，禀识陶形，悉令充足，获无生忍。"}, {"id": 138, "title": "神咒加持净法食，普施河沙众鬼神。", "text": "愿皆饱满舍悭贪，速脱幽冥生净土。"}, {"id": 139, "title": "次结普供养印", "text": "唵。葛葛纳，三婆斡，斡资啰。吽。。诸佛子等，从来所受饮食，皆是人间贩鬻生命，酒脯钱财，血肉腥膻，荤辛臭秽。虽复受得如是饮食，比如毒药，损坏于身，但增苦本，沉沦苦海，无解脱时。我今依如来教，精诚罄舍，设此无遮广大法会。汝等今日，遇兹胜事，戒品沾身。于过去世，广事诸佛，亲近善友，供养三宝。由此因缘，值善知识，发菩提心，誓愿成佛，不求余果。先得道者，递相度脱。又愿汝等，昼夜恒常拥护于我，满我所愿，以此施食所生功德，普将回施法界有情，共诸有情，同将此福，尽皆回施无上菩提，一切种智。勿招余果，愿速成佛，愿速成佛。。大众同念尊胜咒（佛顶尊胜陀罗尼广咒，参考显密经典整理注音）：。西域尊者往东来，却被文殊化引开。东土若无尊胜咒，孤魂难以脱尘埃。。唵。部隆(二合)，莎诃。唵。捺谟巴葛(ga)斡(wa)谛。萨哩斡(二合rua，下同)，得啰卢迦。卜啰(二合bra)谛，尾涉瑟吒(二合)耶。勃塔耶爹，捺麻。答地牙(二合dia)塔。唵，部隆，部隆，部隆。输塔耶，输塔耶。尾输塔耶，尾输塔耶。阿萨麻，萨蛮达，阿斡巴萨。思葩啰拿，葛谛葛葛拿。莎巴斡，尾述提。阿撇膻(shan)，暂都晗。。萨哩斡(wa)，答塔葛达。苏葛答，瓦啰斡拶(za)拿。阿密哩达，阿撇释该而。马曷木得啰(二合dla)。曼特啰叭呆。阿曷啰，阿曷啰。马麻，蔼由而(二合)伞塔啰尼。。输塔耶，输塔耶。尾输塔耶，尾输塔耶。葛葛拿，娑巴斡，尾述提。乌失尼沙，尾拶耶。巴哩述提，萨曷思啰(二合sra)，啰思弥(二合)。伞租爹敌。。萨哩斡，答塔葛达。阿斡噜吉尼，煞吒(二合)，巴啰密达，巴哩卜啰尼。。萨哩斡，答塔葛达。麻谛答摄，部密钵啰，地瑟致谛。。萨哩斡，答塔葛达。赫哩(二合hri)达耶。阿地瑟吒拿，阿地瑟致谛。木得哩(二合dri)，木得哩，马曷木得哩。斡资啰(二合zra)，葛耶，三曷达拿，叭哩述提。。萨哩斡，葛哩麻，阿斡啰拿，尾述提。钵啰牒，聂斡而达(二合)耶。马麻蔼由而，尾述提。。萨哩斡，答塔葛达，萨麻耶。阿地瑟吒拿，阿地瑟致谛。"}, {"id": 140, "title": "唵。摩尼，摩尼，马曷摩尼。尾摩尼，尾摩尼，摩曷尾摩尼。", "text": "麻谛，麻谛，马曷麻谛。麻麻谛，莎麻谛。答塔葛达，部达戈迟。巴哩述提，尾思蒲吒。卜提述提。唏唏，拶耶，拶耶。尾拶耶，尾拶耶。思麻啰，思麻啰。思葩啰，思葩啰。思葩啰耶，思葩啰耶。。萨哩斡，勃塔。阿地瑟吒拿，阿地瑟吒谛。述提述提，卜提卜提。。斡资哩，斡资哩。马曷斡资哩，苏斡资哩。。斡资啰，葛(ga)而毗。拶耶，葛而毗。尾拶耶，葛而毗。。斡资啰，左辣葛而毗。斡资啰，忒葩微。斡资啰，三葩微。。斡资哩，斡尔尼。斡资嚂(lan)，巴斡都。麻麻，摄哩嚂。。萨哩斡，萨埵喃。拶葛耶，巴哩述提。巴斡都，萨埵弥。。萨哩斡，葛谛，巴哩述提。释哲。。萨哩斡，答塔葛达，释哲蔓。萨麻刷，萨颜都。卜迪亚卜迪亚。悉迪亚悉迪亚。勃塔耶，勃塔耶。尾勃塔耶，尾勃塔耶。。谟拶耶，谟拶耶。尾谟拶耶，尾谟拶耶。输塔耶，输塔耶。尾输塔耶，尾输塔耶。。萨蛮答，谟拶耶，谟拶耶。萨蛮答，啰思弥，巴哩述提。。萨哩斡，答塔葛达，赫哩(二合hri)达耶。阿地瑟吒拿，阿地瑟致谛。。木得哩，木得哩。马曷木得哩，马曷木得哩。曼特啰，叭谛。莎诃。。（佛顶尊胜陀罗尼心咒：唵。阿弥哩达，阿瑜大帝。梭哈。《佛顶尊胜陀罗尼经》云：此咒能破一切地狱，琰魔王界，旁生之苦，回趋善道。此咒不可思议，有大威神力)。"}, {"id": 141, "title": "南无尊胜幢菩萨摩诃萨（三遍）", "text": "举往生咒三遍。承斯善利，地狱受苦有情者，刀山剑树，变化皆成如意树；火团铁丸，变成莲花而为宝。吉祥地狱解脱而能成正觉。。承斯善利，饿鬼受苦有情者，口中烟焰，烧身速愿得清凉；观音手内，甘露自然常饱满。吉祥饿鬼解脱而能成正觉。。承斯善利，畜生受苦有情者，杀害烧煮，楚毒等苦皆远离；远离乘骑，愚痴速得大智慧。吉祥畜生解脱而能成正觉。。承斯善利，人间受苦有情者，生时犹如，摩耶右胁而降诞；愿具六根，永离八难修福慧。吉祥人间解脱而能成正觉。。承斯善利，修罗受苦有情者，我慢颠狂，拙朴速吉令柔软；恶心嫉妒，嗔恚斗诤自调伏。吉祥修罗解脱而能成正觉。。承斯善利，天中受乐有情者，欲乐策勤，速发广大菩提心；天中受尽，忧苦自然生欢悦。吉祥天中解脱而能成正觉。。承斯善利，十方独觉声闻者，弃舍小乘，四谛十二因缘行；进趣大乘，四舍六度修万行。吉祥二乘解脱而能成正觉。。承斯善利，初地菩萨勇识者，百福庄严，一切行愿皆圆满；顿超十地，证入一生补处位。吉祥大乘速证究竟成正觉。。现世之中未证菩提间，愿无内外障难恶缘等。。恒常遇逢最妙善知识，所修善事行愿速成就。"}, {"id": 142, "title": "最上三宝！", "text": "临命终时识性无迷惑，愿生西方净土如来前。。依于慧日法光闻思修，断惑证真愍念于有情。"}, {"id": 143, "title": "最上三宝！", "text": "若或随业净土佛会前，若无善根不生圣会中。。随业轮回世世所生处，恒修善根熏习无间断。"}, {"id": 144, "title": "最上三宝！", "text": "愿生中国勤修于正法，无病长寿受用悉具足。。相好殊胜辩才智慧等，具七功德获得丈夫身。"}, {"id": 145, "title": "最上三宝！", "text": "幼年出家愿逢贤圣师，即得三种修学守护持。。一切时中正念与正定，承侍微妙上师愿欢喜。"}, {"id": 146, "title": "最上三宝！", "text": "七种胜财殊胜善知识，如日与光刹那不舍离。。亦无我慢疑惑具知足，恶缘犹如蛊毒愿舍离。"}, {"id": 147, "title": "最上三宝！", "text": "功德本愿最上三宝处，愿能恒常归依而供养。。贪欲瞋恚愚痴三种毒，犹如大地恒常勿应起。"}, {"id": 148, "title": "最上三宝！", "text": "观见六尘境界色等法，犹如阳焰幻化而悟解。。五欲自性境处无染着，愿我恒不忘失菩提心。"}, {"id": 149, "title": "最上三宝！", "text": "一切大乘甚深微妙法，如救头燃精进常修学。。证得无比究竟菩提时，以四摄法能救于六趣。"}, {"id": 150, "title": "最上三宝！", "text": "能救五浊大悲观世音，末劫之时弘愿地藏王。。所有一切贤圣护法神，证明护念法灯覆炽然。"}, {"id": 151, "title": "最上三宝！", "text": "护国护法塔庙诸护神，威德炽盛回遮大结界。。怨魔外道毒类悉摧坏，龙鬼星辰毒类心惊怖。"}, {"id": 152, "title": "最上三宝！", "text": "三灾五浊速愿得消除，七难八怖一念皆消灭。。百谷丰饶万物而茂盛，七宝充足五味悉具足。"}, {"id": 153, "title": "最上三宝！", "text": "四事供养受用无乏少，修八福田吉祥获安乐。。普国兴隆佛事转法-轮，增长有情福慧皆圆满。"}, {"id": 154, "title": "最上三宝！", "text": "我等善根缘起法性力，上师本尊空行摄受力。"}, {"id": 155, "title": "三宝真谛密呪威神力，所发愿时行愿速成就。", "text": "最上三宝！。临命终时识性无迷惑，愿生西方净土如来前。。依于慧日法光闻思修，断惑证真愍念于有情。"}, {"id": 156, "title": "最上三宝！", "text": "能回施人回施回施善，所获一切一切诸功德。。犹如幻化幻化似梦境，三轮体空体空悉清净。"}, {"id": 157, "title": "最上三宝！", "text": "愿昼吉祥夜吉祥，昼夜六时恒吉祥。。一切时中吉祥者，愿诸上师哀摄受。"}, {"id": 158, "title": "最上三宝！", "text": "愿昼吉祥夜吉祥，昼夜六时恒吉祥。。一切时中吉祥者，愿诸三宝哀摄受。"}, {"id": 159, "title": "最上三宝！", "text": "愿昼吉祥夜吉祥，昼夜六时恒吉祥。。一切时中吉祥者，愿诸护法常拥护。。南无西方无量寿如来，诸大菩萨，海会圣众。惟愿法界，存亡等罪消除，同生净土，回向无上佛菩提。。愿以此功德，普及于一切。我等与众生，皆共成佛道。"}, {"id": 160, "title": "次结圆满奉送印", "text": "唵。斡资啰，穆吃吒穆。。见闻如幻翳，三界若空花。闻复翳根除，尘消觉圆净。。伏以真源湛寂，乃罪性之本空。苦海洪深，逐妄波而不息。由众生之业感，致长劫以沉沦。受报地狱之中，永罹苦楚；转生饿鬼之内，长忍饥虚。既无解脱之期，宁有超升之路。匪仗如来之慈愿，曷解恶趣之倒悬。咒诵真诠，施甘露之法食；灯燃宝炬，烛冥界之幽途。普使迷流，俱超极乐。今日道场，以此普施功德，回向铁围山内，面燃大士，统领三十六部，无量无边，恒河沙数，诸饿鬼众。伏愿：自从旷劫，迨至今生，释业障以消镕，雪罪愆而清净。镬汤涌沸，变成八德之莲池；炉焰交辉，化作七珍之香盖。剑树皆为玉树，刀山尽作宝山。遍界铁床，现菩提之法座；满釜洞汁，化甘露之醍醐。往昔债主以相逢，俱蒙解脱；积劫冤家而共会，各遂逍遥。狱主兴慈，冥官持善。多生父母，从兹入圣超凡；累世亲姻，自此承恩获福。天上五衰不现，人间四相皆空。修罗舍尽瞋心，地狱息诸苦恼。河沙饿鬼，化热恼而作清凉；十类含生，舍迷途而登觉岸。普愿此国土，他国土，无量诸国土，一切有情，共证真常。此世界，他世界，无量诸世界，无尽含识，齐成佛道。四恩总报，三有均资，法界众生，同圆种智。"}, {"id": 161, "title": "诸佛正法菩萨僧直至菩提我归依", "text": "我以所修诸善根为利有情愿成佛"}, {"id": 162, "title": "世出世间随愿所成随愿所成", "text": "金刚萨埵百字明咒。唵。斡(wa)资啰(二合zra)萨埵(dua)，苏萨麻耶(ya)，麻纳巴辣耶。斡资啰(二合)萨埵，谛奴钵谛瑟(sei)札(二合)。得哩(二合dri)锄弥(mei)癹(ba)咓(wa)。苏度(duo)束(shiu)弥癹咓。阿奴啰(二合)屹都(二合gedou)弥癹咓。苏布苏弥癹咓。萨哩斡(二合rua)，戍提弥不啰(二合)耶茶。萨哩斡(二合)，噶(ga)哩麻(二合)，苏拶(za)弥。稷达释哩(二合)扬骨噜。吽。诃诃诃诃斛。癹噶湾。萨哩斡(二合)，答塔噶达。斡资啰(二合)，麻弥扪拶。斡资啰(二合)癹咓。麻诃萨麻耶，萨埵阿(引)。。（此咒求愿补阙，功德无量。散在诸经。又名句中随宗回转。诵者知之。）"}, {"id": 163, "title": "薜荔多文", "text": "五姓孤魂薜荔多，莫教平地起风波。。慈航泛涨须到岸，洗脚上船会也么。。已发觉，未发觉，莫论酆都并泰岳；。罪无轻重尽蠲除，何须一一重惩悫。。已结证，未结证，打破阎君台畔镜；。慈风扫荡障云消，万里青天孤迥迥。。诸佛子等，会也么？。休休休！更莫造罪结冤仇。钓竿还在阎君手，切莫从前再犯钩。"}, {"id": 164, "title": "即今施食圆满，功德周隆。汝等孤魂佛子，向甚么处安身立命？", "text": "咦！处处总成华藏界，从教何处不毗卢。"}, {"id": 165, "title": "睹莲池不离当处指净土只在目前", "text": "不劳弹指证菩提顷刻便参观自在"}, {"id": 166, "title": "回向偈", "text": "施食功德殊胜行无边胜福皆回向"}, {"id": 167, "title": "普愿沉溺诸有情速往无量光佛刹", "text": "十方三世一切佛一切菩萨摩诃萨"}, {"id": 168, "title": "摩诃般若波罗密", "text": "归依三宝。上来设放瑜伽焰口，平等甘露法食，功德圆满。无限良因，普沾沙界，和南圣众。。谨依瑜伽教，建置启法筵，普施诸有情，皆共成佛道。"}]`;

function init() {
  try {
    SECTION_DATA = JSON.parse(EMBEDDED_DATA);
  } catch(e) {
    SECTION_DATA = null;
  }
  
  if (!SECTION_DATA || SECTION_DATA.length === 0) {
    document.getElementById('sectionList').innerHTML = 
      '<div style="text-align:center;padding:40px;color:#6a6a8a;">⚠️ 文档数据加载失败</div>';
    return;
  }
  
  totalSections = SECTION_DATA.length;
  document.getElementById('countTotal').textContent = totalSections;
  
  // 加载本地存档
  loadProgress();
  renderSections();
  updateStats();
  
  // 启用开始按钮（音频一播放就可用）
  document.getElementById('btnStart').disabled = false;
}

// ===== 渲染经文 =====
function renderSections() {
  const container = document.getElementById('sectionList');
  container.innerHTML = '';
  
  SECTION_DATA.forEach((sec, idx) => {
    const div = document.createElement('div');
    div.className = 'doc-section' + (annotated[idx] ? ' annotated' : '');
    div.id = 'sec-' + idx;
    div.dataset.index = idx;
    
    let html = '';
    if (sec.title && sec.title !== '焰口施食要集')
      html += `<div class="sec-title">${escapeHtml(sec.title)}</div>`;
    html += `<div class="sec-text">${escapeHtml(sec.text)}</div>`;
    
    if (annotated[idx]) {
      const t = annotated[idx];
      html += `<div class="sec-time">⏱ ${fmt(t.start)} → ${fmt(t.end)}</div>`;
    }
    
    div.innerHTML = html;
    div.addEventListener('click', () => markSection(idx));
    container.appendChild(div);
  });
  
  // 快速导航点
  renderNavDots();
}

function renderNavDots() {
  const existing = document.querySelector('.scroll-nav');
  if (existing) existing.remove();
  
  const nav = document.createElement('div');
  nav.className = 'scroll-nav';
  
  for (let i = 0; i < SECTION_DATA.length; i++) {
    const dot = document.createElement('button');
    dot.className = 'dot' + (annotated[i] ? ' annotated' : '');
    dot.title = `第${i+1}段: ${(SECTION_DATA[i].title || SECTION_DATA[i].text).slice(0, 20)}`;
    dot.addEventListener('click', () => {
      document.getElementById('sec-' + i)?.scrollIntoView({ behavior: 'smooth' });
    });
    nav.appendChild(dot);
  }
  document.body.appendChild(nav);
}

// ===== 标注逻辑 =====
function startAnnotation() {
  if (isAnnotating) return;
  
  const player = document.getElementById('audioPlayer');
  if (player.paused && player.currentTime === 0) {
    player.play();
  }
  
  isAnnotating = true;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStart').textContent = '🔴 标注中...';
  
  // 找到第一个未标注的段落
  for (let i = 0; i < totalSections; i++) {
    if (!annotated[i]) {
      highlightSection(i);
      document.getElementById('sec-' + i)?.scrollIntoView({ behavior: 'smooth' });
      break;
    }
  }
  
  updateModeBanner();
}

function markSection(idx) {
  if (!isAnnotating) return;
  
  const player = document.getElementById('audioPlayer');
  const currentTime = getGlobalTime(player);
  
  if (annotated[idx]) {
    // 已标注的段落可以点击来跳转
    playAtTime(annotated[idx].start);
    return;
  }
  
  // 计算当前段落的时间范围
  let startTime = currentTime;
  let endTime = currentTime + 30;  // 默认30秒，等下一个标注时修正
  
  // 查找前一个已标注段落，用它的结束时间作为参考
  let prevEnd = 0;
  for (let i = idx - 1; i >= 0; i--) {
    if (annotated[i]) {
      prevEnd = annotated[i].end;
      break;
    }
  }
  
  // 查找下一个已标注段落
  let nextStart = Infinity;
  for (let i = idx + 1; i < totalSections; i++) {
    if (annotated[i]) {
      nextStart = annotated[i].start;
      break;
    }
  }
  
  // 取前一段结束和当前时间的较大值作为开始
  startTime = Math.max(currentTime, prevEnd);
  endTime = Math.min(startTime + 30, nextStart);
  
  annotated[idx] = { start: Math.round(startTime * 10) / 10, end: Math.round(endTime * 10) / 10 };
  
  // 修正前一段的结束时间
  if (idx > 0 && annotated[idx-1]) {
    annotated[idx-1].end = Math.round(startTime * 10) / 10;
  }
  
  // 更新界面
  renderSections();
  updateStats();
  saveProgress();
  
  // 跳转到下一未标注段
  let nextIdx = -1;
  for (let i = idx + 1; i < totalSections; i++) {
    if (!annotated[i]) { nextIdx = i; break; }
  }
  
  if (nextIdx === -1) {
    // 全部标完
    isAnnotating = false;
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStart').textContent = '▶ 全部完成!';
    updateModeBanner();
    alert('🎉 全部标注完成！点击"导出标注结果"发送给我。');
    return;
  }
  
  highlightSection(nextIdx);
  document.getElementById('sec-' + nextIdx)?.scrollIntoView({ behavior: 'smooth' });
  updateModeBanner();
}

function highlightSection(idx) {
  document.querySelectorAll('.doc-section.active').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('sec-' + idx);
  if (el) el.classList.add('active');
  currentSection = idx;
  
  // 更新导航点
  document.querySelectorAll('.scroll-nav .dot').forEach((dot, i) => {
    dot.classList.toggle('current', i === idx);
  });
}

// ===== 辅助函数 =====
function getGlobalTime(player) {
  const src = player.querySelector('source[src*="晋宁焰口上"]');
  const isUpper = player.currentSrc.includes('晋宁焰口上') || (!player.currentSrc && player.currentTime < 8098);
  
  if (player.currentSrc.includes('晋宁焰口下') || player.currentSrc.includes('下.mp3')) {
    return 8098 + player.currentTime;
  }
  return player.currentTime;
}

function playAtTime(seconds) {
  const player = document.getElementById('audioPlayer');
  if (seconds < 8098) {
    player.querySelector('source[src*="上.mp3"]').removeAttribute('disabled');
    player.querySelector('source[src*="下.mp3"]')?.setAttribute('disabled', '');
    player.src = '晋宁焰口上.mp3';
    player.currentTime = seconds;
  } else {
    player.querySelector('source[src*="上.mp3"]')?.setAttribute('disabled', '');
    player.querySelector('source[src*="下.mp3"]')?.removeAttribute('disabled');
    player.src = '晋宁焰口下.mp3';
    player.currentTime = seconds - 8098;
  }
  player.play();
}

function fmt(seconds) {
  if (seconds === undefined || seconds === null) return '--:--';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function updateModeBanner() {
  const banner = document.getElementById('modeBanner');
  if (isAnnotating) {
    const done = Object.keys(annotated).length;
    banner.className = 'mode-banner mode-recording';
    banner.textContent = `🔴 标注中 — 听音频 → 点击对应的经文段落 (${done}/${totalSections})`;
  } else {
    const done = Object.keys(annotated).length;
    if (done >= totalSections) {
      banner.className = 'mode-banner mode-idle';
      banner.textContent = '✅ 全部标注完成！请导出结果';
    } else if (done > 0) {
      banner.className = 'mode-banner mode-idle';
      banner.textContent = `⏸ 已暂停 — 已标注 ${done}/${totalSections} 段`;
    } else {
      banner.className = 'mode-banner mode-idle';
      banner.textContent = '⏸ 待命 — 播放音频后点击【开始标注】';
    }
  }
}

function updateStats() {
  const done = Object.keys(annotated).length;
  document.getElementById('countDone').textContent = done;
  const pct = Math.round(done / totalSections * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

// ===== 导入导出 =====
function exportData() {
  const data = {
    version: 1,
    date: new Date().toISOString(),
    totalSections: totalSections,
    annotated: annotated,
    audioFiles: ['晋宁焰口上.mp3', '晋宁焰口下.mp3']
  };
  document.getElementById('exportText').value = JSON.stringify(data, null, 2);
  document.getElementById('exportModal').classList.add('show');
}

function copyExport() {
  const text = document.getElementById('exportText');
  text.select();
  navigator.clipboard.writeText(text.value).then(() => {
    alert('✅ 已复制，请发送给我！');
  }).catch(() => {
    document.execCommand('copy');
    alert('✅ 请手动复制文本发送给我');
  });
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.annotated) {
        annotated = data.annotated;
        renderSections();
        updateStats();
        updateModeBanner();
        alert(`✅ 已导入存档：${Object.keys(annotated).length} 段已标注`);
      }
    } catch(err) {
      alert('❌ 文件格式错误');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function saveProgress() {
  try {
    const data = { annotated, totalSections };
    localStorage.setItem('yankou_annotation', JSON.stringify(data));
  } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('yankou_annotation');
    if (raw) {
      const data = JSON.parse(raw);
      if (data.annotated) {
        annotated = data.annotated;
        renderSections();
        updateStats();
        updateModeBanner();
      }
    }
  } catch(e) {}
}

function resetAll() {
  if (!confirm('确定重置所有标注？此操作不可撤销。')) return;
  annotated = {};
  localStorage.removeItem('yankou_annotation');
  renderSections();
  updateStats();
  updateModeBanner();
  isAnnotating = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStart').textContent = '▶ 开 始 标 注';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// ===== 音频事件 =====
document.getElementById('audioPlayer').addEventListener('timeupdate', function() {
  const t = getGlobalTime(this);
  document.getElementById('timeDisplay').textContent = fmt(t);
});

document.getElementById('audioPlayer').addEventListener('play', function() {
  if (!isAnnotating) {
    document.getElementById('btnStart').disabled = false;
  }
});

// ===== 快捷键 =====
document.addEventListener('keydown', function(e) {
  const player = document.getElementById('audioPlayer');
  
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  
  switch(e.key) {
    case ' ':
      e.preventDefault();
      if (player.paused) player.play();
      else player.pause();
      break;
    case 'Enter':
      e.preventDefault();
      if (isAnnotating && currentSection >= 0 && !annotated[currentSection]) {
        markSection(currentSection);
      } else if (!isAnnotating) {
        startAnnotation();
      }
      break;
    case 'ArrowUp':
      e.preventDefault();
      let up = currentSection;
      while (up > 0) {
        up--;
        if (!annotated[up]) {
          highlightSection(up);
          document.getElementById('sec-' + up)?.scrollIntoView({ behavior: 'smooth' });
          break;
        }
      }
      break;
    case 'ArrowDown':
      e.preventDefault();
      for (let i = currentSection + 1; i < totalSections; i++) {
        if (!annotated[i]) {
          highlightSection(i);
          document.getElementById('sec-' + i)?.scrollIntoView({ behavior: 'smooth' });
          break;
        }
      }
      break;
    case 'ArrowLeft':
      player.currentTime = Math.max(0, player.currentTime - 5);
      break;
    case 'ArrowRight':
      player.currentTime += 5;
      break;
  }
});

// ===== 加载完成时初始化 =====
document.addEventListener('DOMContentLoaded', init);
window.addEventListener('load', function() {
  // 如果数据没嵌入，重试
  if (!SECTION_DATA) init();
});
</script>

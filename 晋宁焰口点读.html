<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晋宁焰口 · 瑜伽焰口施食要集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Noto Serif CJK SC", "SimSun", "Songti SC", serif;
  background: #1a1a2e;
  color: #e8d5b7;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

.header {
  text-align: center;
  padding: 30px 0 20px;
  border-bottom: 1px solid #3a3a5e;
  margin-bottom: 24px;
}
.header h1 { font-size: 24px; color: #f0d78a; letter-spacing: 4px; }
.header .subtitle { font-size: 14px; color: #8a8aaa; margin-top: 8px; }
.header .audio-status {
  font-size: 13px;
  color: #6a8a6a;
  margin-top: 12px;
  padding: 8px 16px;
  background: #1e2e1e;
  border-radius: 6px;
  display: inline-block;
}

.audio-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f1e;
  border-top: 1px solid #3a3a5e;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 100;
}
.audio-bar audio { flex: 1; height: 40px; }
.audio-bar .time-display {
  font-size: 13px;
  color: #8a8aaa;
  min-width: 100px;
  text-align: center;
  font-family: monospace;
}

.doc-section {
  margin-bottom: 16px;
  padding: 12px 16px;
  background: #222244;
  border-radius: 8px;
  border-left: 3px solid #4a4a7e;
  cursor: pointer;
  transition: all 0.2s ease;
}
.doc-section:hover {
  background: #2a2a54;
  border-left-color: #f0d78a;
}
.doc-section .sec-title {
  font-size: 13px;
  color: #8a8aaa;
  margin-bottom: 4px;
}
.doc-section .sec-text {
  font-size: 16px;
  line-height: 1.8;
  color: #e8d5b7;
}
.doc-section .sec-time {
  font-size: 11px;
  color: #5a5a7a;
  margin-top: 6px;
  text-align: right;
  font-family: monospace;
}
.doc-section.playing {
  background: #2a3a2a;
  border-left-color: #6aaa6a;
}
.doc-section.matched {
  border-left-color: #f0d78a;
}

.loading {
  text-align: center;
  padding: 60px 20px;
  color: #6a6a8a;
}
.loading .spinner {
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 3px solid #3a3a5e;
  border-top-color: #f0d78a;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 手机适配 */
@media (max-width: 480px) {
  body { padding: 12px 10px 90px; }
  .header h1 { font-size: 20px; }
  .doc-section { padding: 10px 12px; }
  .doc-section .sec-text { font-size: 15px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>瑜伽焰口施食要集</h1>
  <div class="subtitle">晋宁焰口 · 2024年4月30日录</div>
  <div class="audio-status" id="audioStatus">⏳ 正在加载音频...</div>
</div>

<div id="sections">
  <div class="loading">
    <div class="spinner"></div>
    <p>加载经文中...</p>
  </div>
</div>

<div class="audio-bar">
  <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
// ===== 经文数据结构 =====
const SECTIONS = null;  // 将由Python填充

// ===== 时间轴映射 =====
const TIME_MAP = null;  // 将由Python填充

// ===== 音频文件配置 =====
const AUDIO_FILES = [
  { file: "晋宁焰口上.mp3", label: "上", offset: 0, duration: 8098 },
  { file: "晋宁焰口下.mp3", label: "下", offset: 8098, duration: 3864 }
];

const TOTAL_DURATION = AUDIO_FILES.reduce((s, f) => s + f.duration, 0);

// ===== 状态 =====
let audioData = [];
let currentPlaying = null;

// ===== 辅助函数 =====
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ===== 音频文件加载 =====
async function loadAudioFiles() {
  const status = document.getElementById('audioStatus');
  for (let i = 0; i < AUDIO_FILES.length; i++) {
    const f = AUDIO_FILES[i];
    status.textContent = `⏳ 正在加载${f.label}部音频...`;
    try {
      const resp = await fetch(f.file);
      if (!resp.ok) throw new Error('文件未找到');
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio();
      audio.src = url;
      audioData.push({ ...f, audio, url });
    } catch (e) {
      console.warn(`加载${f.file}失败:`, e.message);
      audioData.push({ ...f, audio: null, url: null });
    }
  }
  
  const loaded = audioData.filter(d => d.audio).length;
  if (loaded === 0) {
    status.innerHTML = '⚠️ 音频文件未找到，请将MP3文件放在本页面同一目录下';
  } else {
    status.textContent = `✅ 已加载 ${loaded}/${AUDIO_FILES.length} 部音频`;
  }
}

// ===== 播放指定时间 =====
function playAtTime(globalSeconds) {
  let remaining = globalSeconds;
  for (let i = 0; i < audioData.length; i++) {
    const d = audioData[i];
    if (!d.audio) continue;
    if (remaining < d.duration) {
      const player = document.getElementById('audioPlayer');
      player.src = d.url;
      player.currentTime = remaining;
      player.play();
      
      document.getElementById('timeDisplay').textContent = 
        `${formatDuration(globalSeconds)} / ${formatDuration(TOTAL_DURATION)}`;
      return;
    }
    remaining -= d.duration;
  }
}

// ===== 渲染经文 =====
function renderSections() {
  if (!SECTIONS || SECTIONS.length === 0) {
    document.getElementById('sections').innerHTML = 
      '<div class="loading"><p>经文数据加载中...</p></div>';
    return;
  }
  
  const container = document.getElementById('sections');
  container.innerHTML = '';
  
  SECTIONS.forEach((sec, idx) => {
    const div = document.createElement('div');
    div.className = 'doc-section';
    div.dataset.index = idx;
    
    let titleHtml = '';
    if (sec.title && sec.title !== '焰口施食要集') {
      titleHtml = `<div class="sec-title">${sec.title}</div>`;
    }
    
    const timeStr = TIME_MAP && TIME_MAP[idx] 
      ? `${formatDuration(TIME_MAP[idx][0])} - ${formatDuration(TIME_MAP[idx][1])}`
      : '';
    
    div.innerHTML = `
      ${titleHtml}
      <div class="sec-text">${sec.text}</div>
      ${timeStr ? `<div class="sec-time">${timeStr}</div>` : ''}
    `;
    
    div.addEventListener('click', () => {
      if (TIME_MAP && TIME_MAP[idx]) {
        const [start] = TIME_MAP[idx];
        playAtTime(start);
        document.querySelectorAll('.doc-section.playing').forEach(el => el.classList.remove('playing'));
        div.classList.add('playing');
      }
    });
    
    container.appendChild(div);
  });
}

// ===== 更新时间显示 =====
document.getElementById('audioPlayer').addEventListener('timeupdate', () => {
  const player = document.getElementById('audioPlayer');
  let currentOffset = 0;
  for (const d of audioData) {
    if (d.audio && d.audio === player) {
      const globalTime = d.offset + player.currentTime;
      document.getElementById('timeDisplay').textContent = 
        `${formatDuration(globalTime)} / ${formatDuration(TOTAL_DURATION)}`;
      break;
    }
  }
});

// ===== 初始化 =====
if (SECTIONS) renderSections();
loadAudioFiles();
</script>
</body>
</html>
